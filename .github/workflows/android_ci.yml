name: Android CI

on:
  pull_request:
    branches: [ master, main ]
    types: [opened, synchronize, reopened, closed]

jobs:
  build:
    # Only run the full build if the PR is merged/closed to master, 
    # OR if it's an active PR to check for compilation/tests.
    # Note: 'closed' with 'merged: true' is the standard way to detect an "approved and merged" PR.
    if: github.event_name == 'pull_request' && (github.event.action != 'closed' || github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2.0.10

      - name: Create local.properties
        run: |
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> local.properties
          echo "GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Artifacts
        if: github.event.pull_request.merged == true
        uses: actions/upload-artifact@v4
        with:
          name: weather-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
